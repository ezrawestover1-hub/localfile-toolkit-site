name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to apply the remote D1 migrations and deploy"
        required: true
        type: string

jobs:
  deploy:
    if: inputs.confirm == 'DEPLOY'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the selected branch
        uses: actions/checkout@v4

      - name: Apply remote D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply localfile-toolkit-licenses --remote

      - name: Deploy Worker and assets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
