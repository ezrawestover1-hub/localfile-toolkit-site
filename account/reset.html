<!doctype html>
<html lang="en"><head><meta name="robots" content="noindex,nofollow"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reset password — LocalFile Toolkit</title><link rel="stylesheet" href="/account/styles.css"></head>
<body><header class="topbar"><div class="shell nav"><a class="brand" href="/">LocalFile Toolkit</a><a href="/pricing.html">View pricing</a></div></header><main class="shell main"><div class="intro"><h1>Reset your password.</h1><p>Enter your email first. We’ll then send a one-time code before allowing a password change.</p></div><section class="panel"><form id="reset-form" class="form"><label for="email">Account email<input id="email" name="email" type="email" autocomplete="email" required></label><button id="request-code" class="button secondary" type="button">Send reset code</button><div id="reset-fields" class="form" hidden><label for="code">Verification code<input id="code" name="code" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6"></label><label for="password">New password<input id="password" name="password" type="password" autocomplete="new-password" minlength="8"></label><label for="confirm-password">Re-enter password<input id="confirm-password" name="confirm_password" type="password" autocomplete="new-password" minlength="8"></label><button id="resend-code" class="button secondary" type="button">Resend reset code</button><button class="button" type="submit">Reset password</button></div></form><p id="reset-message" class="message" role="status" aria-live="polite"></p><p><a href="/account/login.html">Return to sign in</a></p></section></main><footer class="shell footer"><a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a> · <a href="/support.html">Support</a> · <a href="mailto:localfiletools.support@gmail.com">localfiletools.support@gmail.com</a></footer><script type="module" src="/account/reset.js"></script></body></html>
